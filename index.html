<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reliable Custom Pseudocode IDE</title>
    <link rel="stylesheet" href="css/index.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  </head>
  <body>
    <!-- index.html -->
    <div class="title-container">
      <!-- Contenteditable allows native typing behavior directly inside the H2 tag -->
      <h2 id="editable-title" contenteditable="true" spellcheck="false">
        My Pseudocode Project
      </h2>
      <span class="edit-icon">✏️</span>

      <select id="theme-selector">
        <option value="vs-dark">Default VS Dark</option>
        <option value="one-dark-pro">One Dark Pro</option>
        <option value="dracula" selected>Dracula Official</option>
        <option value="my-light-theme">My Light Theme</option>
      </select>

      <button id="copy-indents-btn" class="ide-btn format-btn">
        📋 Copy Indents Only
      </button>
    </div>
    <div id="editor"></div>

    <script src="js/title.js"></script>
    <script src="js/config.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/copyToWord.js"></script>
    <script src="js/themeDDL.js"></script>
  </body>
</html>
